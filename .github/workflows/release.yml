name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v1.0.1)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build controller
        shell: pwsh
        run: ./build.ps1

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/MultiRobloxController.exe package/
          Copy-Item installer/Install-MultiRoblox.ps1 package/
          Copy-Item installer/Install-MultiRoblox.cmd package/
          Copy-Item README.md package/README.txt
          Compress-Archive -Path package/* -DestinationPath MultiRoblox.zip -Force

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ github.event.inputs.tag }}"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: MultiRoblox ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/MultiRobloxController.exe
            installer/Install-MultiRoblox.ps1
            installer/Install-MultiRoblox.cmd
            MultiRoblox.zip
