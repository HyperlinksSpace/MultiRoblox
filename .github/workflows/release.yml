name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: pwsh
        run: |
          # Auto-version every main commit: v1.<run_number>.0
          # (stable, monotonically increasing, no manual tagging needed)
          $run = "${{ github.run_number }}"
          $version = "1.$run.0"
          $tag = "v$version"
          $sha = "${{ github.sha }}".Substring(0, 7)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release tag: $tag (commit $sha)"

      - name: Build controller
        shell: pwsh
        run: ./build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/MultiRobloxController.exe package/
          Copy-Item installer/Install-MultiRoblox.ps1 package/
          Copy-Item installer/Install-MultiRoblox.cmd package/
          Copy-Item README.md package/README.txt
          Compress-Archive -Path package/* -DestinationPath MultiRoblox.zip -Force
          # Friendly asset name for the website's direct download button
          Copy-Item dist/MultiRobloxController.exe MultiRoblox.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MultiRoblox ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Automated release from commit `${{ steps.version.outputs.sha }}` on `main`.

            **Download `MultiRoblox.exe`** and run it — one button, unlimited Roblox instances.
            Prefer Start Menu shortcuts + auto-update? Use `Install-MultiRoblox.cmd` instead.
          files: |
            MultiRoblox.exe
            dist/MultiRobloxController.exe
            installer/Install-MultiRoblox.ps1
            installer/Install-MultiRoblox.cmd
            MultiRoblox.zip
